    <!--        Блок формы добавления нового клиента/записи (?) -->
            <section id="form-section">
                <h1>Новый клиент</h1>

                <div id="form-section__content">

                    <form class="form" id="form">

                        <fieldset>
                            <label for="client-name">Имя клиента</label>
                            <input type="text" name="client-name" id="client-name" placeholder="Введите имя клиента"
                            required minlength="2" maxlength="20">
                        </fieldset>

                        <fieldset>
                            <label for="client-tel">Телефон клиента</label>
                            <input type="tel" name="client-tel" id="client-tel" placeholder="+7 999 123-45-67"
                            required inputmode="tel">
                        </fieldset>

                        <fieldset>
                            <label for="client-tg">Telegram клиента</label>
                            <input type="text" name="client-tg" id="client-tg" placeholder="Введите Telegram клиента"
                            required minlength="2" maxlength="20" value="@">
                        </fieldset>

                        <button type="submit">Добавить клиента</button>

                    </form>

                </div>
            </section>

        </div>
