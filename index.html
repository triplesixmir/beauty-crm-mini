<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <link
    rel="stylesheet"
    href="css/styles.css"
  >
  <!--    Шрифты -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >
  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet"
  >
  <title>Beauty CRM Mini</title>
</head>
<body>

<aside>

  <div class="logo-container">
    <img
      src="img/logo.png"
      alt="logo"
      id="header-logo"
    >
    <h3>Beauty CRM</h3>
  </div>

  <nav>
    <ul>
      <li>
        <a href="#">Дэшборд</a>
      </li>
      <li>
        <a href="#">Клиенты</a>
      </li>
      <li>
        <a href="#">Календарь</a>
      </li>
      <li>
        <a href="#">Сервисы</a>
      </li>
      <li>
        <a href="#">Финансы</a>
      </li>
      <li>
        <a href="#">Настройки</a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-profile-container">
    <img
      src="img/profilepicture.jpg"
      alt="profile picture"
      id="profile-picture"
    >
    <p>Михаил Ямской</p>
  </div>

</aside>

<main class="dashboard">

  <div class="dashboard__stats">

  </div>

  <div class="dashboard__top">

    <!--        Блок клиентов -->
    <section id="clients-section">
      <h1>Клиенты</h1>

      <div class="clients-section__action-block">

        <div class="clients-section__action">

          <label for="sort-clients">Сортировка</label>
          <select
            name="sort-clients"
            id="sort-clients"
          >
            <option value="alphabet-up-sort">По имени А — Я</option>
            <option value="alphabet-down-sort">По имени Я — А</option>
            <option value="last-visit-sort">По дате последнего визита</option>
            <option value="total-spent-sort">По потраченной сумме</option>
          </select>

        </div>

        <div class="clients-section__action">

          <label for="search-input">Поиск клиентов</label>
          <input
            type="text"
            name="search-input"
            id="search-input"
            placeholder="Поиск клиента..."
          >

        </div>

        <div
          class="clients-section__action"
          id="add-client-btn-container"
        >

          <button id="open-add-client-modal-btn">Добавить клиента</button>

        </div>

      </div>

      <div id="clients-section__content">

      </div>

    </section>

  </div>

  <div class="dashboard__bottom">

    <!--            Блок записей -->
    <section id="appointments-section">
      <h1>Записи</h1>

      <div
        class="content"
        id="appointments-section__content"
      >

        <div id="appointments-section__list">

        </div>

        <form id="appointment-form">
          <fieldset class="radio-fieldset">
            <label for="appointment-service-manicure">Маникюр
              <input
                type="radio"
                name="appointment-service"
                id="appointment-service-manicure"
                value="service-manicure"
                checked
              >
            </label>

            <label for="appointment-service-pedicure">Педикюр
              <input
                type="radio"
                name="appointment-service"
                id="appointment-service-pedicure"
                value="service-pedicure"
              >
            </label>

            <label for="appointment-service-haircut">Стрижка
              <input
                type="radio"
                name="appointment-service"
                id="appointment-service-haircut"
                value="service-haircut"
              >
            </label>

            <label for="appointment-service-depilation">Депиляция
              <input
                type="radio"
                name="appointment-service"
                id="appointment-service-depilation"
                value="service-depilation"
              >
            </label>

            <label for="appointment-service-laying">Укладка
              <input
                type="radio"
                name="appointment-service"
                id="appointment-service-laying"
                value="service-laying"
              >
            </label>
          </fieldset>
          <fieldset class="input-fieldset">
            <label for="appointment-date">
              <input
                type="date"
                name="appointment-date"
                id="appointment-date"
                required
              >
            </label>

            <label for="appointment-time">
              <input
                type="time"
                name="appointment-time"
                id="appointment-time"
                required
              >
            </label>

            <label for="appointment-price">
              <input
                type="number"
                name="appointment-price"
                id="appointment-price"
                placeholder="Введите стоимость услуги"
                min="1"
                required
              >
            </label>

            <label for="appointment-clients">Выберите клиента</label>
            <select
              name="appointment-clients"
              id="appointment-clients"
            >

            </select>

          </fieldset>

          <button type="submit">Добавить запись</button>
        </form>

      </div>

    </section>

  </div>

</main>

<section id="modals">

  <div
    class="add-client-modal hidden"
    id="add-client-modal"
  >

    <form
      class="form"
      id="addClientForm"
    >

      <fieldset>
        <label for="client-name">Имя клиента</label>
        <input
          type="text"
          name="client-name"
          id="client-name"
          placeholder="Введите имя клиента"
          required
          minlength="2"
          maxlength="20"
        >
      </fieldset>

      <fieldset>
        <label for="client-tel">Телефон клиента</label>
        <input
          type="tel"
          name="client-tel"
          id="client-tel"
          placeholder="+7 999 123-45-67"
          required
          inputmode="tel"
        >
      </fieldset>

      <fieldset>
        <label for="client-tg">Telegram клиента</label>
        <input
          type="text"
          name="client-tg"
          id="client-tg"
          placeholder="Введите Telegram клиента"
          required
          minlength="2"
          maxlength="20"
          value="@"
        >
      </fieldset>

      <fieldset>
        <label for="client-last_visit">Дата посещения</label>
        <input
          type="date"
          name="client-last_visit"
          id="client-last_visit"
          required
        >
      </fieldset>

      <fieldset>
        <label for="client-total_spent">Всего потрачено</label>
        <input
          type="number"
          name="client-total_spent"
          id="client-total_spent"
          required
          min="1"
        >
      </fieldset>


      <div class="add-client-modal__buttons">
        <button
          type="submit"
          id="submit-client-btn"
        >Добавить клиента
        </button>
        <button
          type="button"
          class="add-client-modal__close-btn"
        >Отменить
        </button>
      </div>

    </form>

  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/inputmask@5.0.8/dist/inputmask.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
